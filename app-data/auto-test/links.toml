[settings]
primary_data_repo = "app-data/auto-test-runtime/repo"
backup_dir = "app-data/auto-test-runtime/link-backups"
log_dir = "app-data/auto-test-runtime/logs"

[[data_repos]]
id = "primary"
label = "Auto Test Data Repo"
path = "app-data/auto-test-runtime/repo"
enabled = true

[[backup_roots]]
id = "auto-test-runtime"
label = "auto-test-runtime"
path = "app-data/auto-test-runtime"
enabled = true

[[mapping_roots]]
id = "auto-test-children"
label = "Auto Test Children"
data_repo_id = "primary"
source = "root-children"
target = "app-data/auto-test-runtime/target/root-target"
mode = "children"
enabled = true
ignore = ["ignored-child"]

[[mapping_roots]]
id = "auto-test-direct"
label = "Auto Test Direct"
data_repo_id = "primary"
source = "direct-source"
target = "app-data/auto-test-runtime/target/direct-link"
mode = "direct"
enabled = true
ignore = []

[[free_links]]
id = "auto-test-free-link"
label = "Auto Test Free Link"
data_repo_id = "primary"
source = "free-source"
target = "app-data/auto-test-runtime/target/free-link"
kind = "directory"
enabled = true
